<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#0078D7;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8A2BE2;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="10"/> 
          <feOffset dx="5" dy="5" result="offsetblur"/>
          <feComponentTransfer>
            <feFuncA type="linear" slope="0.3"/>
          </feComponentTransfer>
          <feMerge> 
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/> 
          </feMerge>
        </filter>
    </defs>
    
    <rect width="512" height="512" rx="128" fill="#ffffff"/>

    <g transform="translate(100, 120)" filter="url(#shadow)">
        <rect x="0" y="160" width="180" height="80" rx="20" fill="url(#grad1)" opacity="0.6"/>
        <rect x="100" y="80" width="180" height="80" rx="20" fill="url(#grad1)" opacity="0.8"/>
        <rect x="200" y="0" width="120" height="120" rx="30" fill="url(#grad1)"/>
        <path d="M235 60L260 85L295 35" stroke="white" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
</svg>